
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PLAIT - Premier Hair Styling Destination</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#A36B42",
              secondary: "#B83B5E",
              "background-light": "#F8F5F2",
              "background-dark": "#12100E",
              "brand-charcoal": "#1A1816",
            },
            fontFamily: {
              display: ["Playfair Display", "serif"],
              sans: ["Inter", "sans-serif"],
              meringue: ["Tan Meringue", "serif"],
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-white text-slate-900 font-sans antialiased overflow-x-hidden;
        }
      }
      @font-face {
        font-family: "Tan Meringue";
        src: url("/fonts/TAN-Meringue-Font/TAN%20MERINGUE.otf") format("opentype");
        font-weight: 400;
        font-style: normal;
      }

      .logo-text {
        font-family: "Tan Meringue", serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
      .modal-blur {
        backdrop-filter: blur(8px);
        background: rgba(0, 0, 0, 0.7);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@7?external=react,react-dom",
    "react-router-dom/": "https://esm.sh/react-router-dom@7&external=react,react-dom/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
